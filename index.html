<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rexona AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Rexona AI 🤖</h1>

<div class="container">

    <!-- KALKULATOR -->
    <div class="calculator">
        <h2>Kalkulator</h2>
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button onclick="clearDisplay()">AC</button>
            <button onclick="append('%')">%</button>
            <button onclick="append('/')">÷</button>
            <button onclick="append('*')">×</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('-')">-</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('+')">+</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calculate()">=</button>

            <button onclick="append('0')" class="zero">0</button>
            <button onclick="append('.')">.</button>
        </div>
    </div>

    <!-- AI -->
    <div class="ai-box">
        <h2>Rexona AI Assistant</h2>

        <input type="text" id="nlpInput" placeholder="Contoh: 2 mobil tambah 2 mobil">
        <button onclick="processNLP()">Tanya</button>

        <div class="result-box">
            <p id="nlpResult">Halo! Saya Rexona AI 🤖</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
